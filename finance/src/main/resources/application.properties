spring.application.name=finance-service

spring.cloud.config.enabled=false
# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/finance_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=RootPass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# Cache Configuration
spring.cache.type=simple

# Server Configuration
server.port=8085
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024

# Feign Client Configuration
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000
feign.client.config.default.loggerLevel=basic

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowSize=100
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=10
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=60000
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.slowCallRateThreshold=50
resilience4j.circuitbreaker.configs.default.slowCallDurationThreshold=2000

resilience4j.circuitbreaker.instances.projectServiceCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.projectServiceCircuitBreaker.waitDurationInOpenState=30000

resilience4j.circuitbreaker.instances.vendorServiceCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.vendorServiceCircuitBreaker.waitDurationInOpenState=30000

# Retry Configuration
resilience4j.retry.configs.default.maxAttempts=3
resilience4j.retry.configs.default.waitDuration=1000
resilience4j.retry.configs.default.retryExceptions[0]=java.net.ConnectException
resilience4j.retry.configs.default.retryExceptions[1]=java.io.IOException
resilience4j.retry.configs.default.ignoreExceptions[0]=com.buildsmart.finance.exception.BusinessRuleException

resilience4j.retry.instances.projectServiceRetry.baseConfig=default
resilience4j.retry.instances.projectServiceRetry.maxAttempts=2

resilience4j.retry.instances.vendorServiceRetry.baseConfig=default
resilience4j.retry.instances.vendorServiceRetry.maxAttempts=2


# Eureka
eureka.client.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Actuator
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.tags.application=finance-service
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
# Logging
logging.level.root=INFO
logging.level.com.buildsmart.finance=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=DEBUG

logging.file.name=logs/finance-service.log
logging.file.max-size=10MB
logging.file.max-history=30