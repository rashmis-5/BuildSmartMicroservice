server.port=8081
spring.application.name=api-gateway

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# CORS is configured in com.buildsmart.gateway.config.CorsConfig (CorsWebFilter bean).
# Do NOT also configure spring.cloud.gateway.globalcors here -- it produces duplicate headers.

# Routes: IAM
spring.cloud.gateway.routes[0].id=iam-auth
spring.cloud.gateway.routes[0].uri=lb://iam-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=iam-users
spring.cloud.gateway.routes[1].uri=lb://iam-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/users/**

spring.cloud.gateway.routes[2].id=iam-admin
spring.cloud.gateway.routes[2].uri=lb://iam-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/admin/**

# Routes: Project Manager (Eureka name = project-service, context-path = /api)
spring.cloud.gateway.routes[3].id=pm-projects
spring.cloud.gateway.routes[3].uri=lb://project-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/projects/**

spring.cloud.gateway.routes[4].id=pm-approvals
spring.cloud.gateway.routes[4].uri=lb://project-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/approvals/**

spring.cloud.gateway.routes[5].id=pm-templates
spring.cloud.gateway.routes[5].uri=lb://project-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/templates/**

spring.cloud.gateway.routes[6].id=pm-notifications
spring.cloud.gateway.routes[6].uri=lb://project-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/notifications/**

# Logging / actuator
logging.level.org.springframework.cloud.gateway=INFO
management.endpoints.web.exposure.include=health,gateway
