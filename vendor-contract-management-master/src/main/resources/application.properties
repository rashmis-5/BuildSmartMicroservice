spring.application.name=vendor-service

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/vendordb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=RootPass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Port
server.port=8088

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# JWT (must match IAM service's jwt.secret)
app.jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890}

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator
management.endpoints.web.exposure.include=health,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# Feign Circuit Breaker support
# IMPORTANT: kept disabled because the Resilience4j TimeLimiter that gets
# auto-wired here runs each Feign call on a worker thread. The Authorization
# header forwarding interceptor in FeignConfig reads the JWT from
# RequestContextHolder (a ThreadLocal) — which is empty on that worker thread.
# With the circuit breaker on, every PM call goes out without a JWT, PM
# returns 401, and the failure is masked by the fallback factory as a generic
# "PM unavailable" error. Disabling this lets Feign run on the request thread
# so the interceptor can correctly propagate the user's bearer token.
spring.cloud.openfeign.circuitbreaker.enabled=false

# Resilience4j Circuit Breaker - IAM Service
resilience4j.circuitbreaker.instances.iam-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.iam-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.iam-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.iam-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.iam-service.register-health-indicator=true
resilience4j.circuitbreaker.instances.iam-service.automatic-transition-from-open-to-half-open-enabled=true

# Resilience4j Circuit Breaker - Project Manager Service
resilience4j.circuitbreaker.instances.project-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.project-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.project-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.project-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.project-service.register-health-indicator=true
resilience4j.circuitbreaker.instances.project-service.automatic-transition-from-open-to-half-open-enabled=true

# Resilience4j Retry - IAM Service
resilience4j.retry.instances.iam-service.max-attempts=3
resilience4j.retry.instances.iam-service.wait-duration=2s

# Resilience4j Retry - Project Manager Service
resilience4j.retry.instances.project-service.max-attempts=3
resilience4j.retry.instances.project-service.wait-duration=2s

# Logging
logging.level.com.buildsmart.vendor=DEBUG
logging.file.name=logs/vendor-service.log
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
